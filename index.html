<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* RESET & STYLES (તમારી ઓરિજિનલ ડિઝાઈન) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(10,10,35,0.75),rgba(10,10,35,0.75)), url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1974&auto=format&fit=crop') no-repeat center center/cover;
        }
        .container { width: 900px; height: 520px; display: flex; border-radius: 25px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .left { width: 50%; padding: 50px; color: white; background: rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: center; }
        .left h1 { font-size: 42px; margin-bottom: 15px; font-weight: 700; }
        .left p { color: #ddd; line-height: 28px; }
        .right { width: 50%; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .login-box { width: 80%; color: white; }
        .login-box h2 { text-align: center; margin-bottom: 25px; font-size: 32px; font-weight: 600; }
        .input-group { margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 14px; border: none; outline: none; border-radius: 10px; background: rgba(255,255,255,0.15); color: white; font-size: 15px; transition: background 0.3s ease; }
        .input-group input:focus { background: rgba(255,255,255,0.25); box-shadow: 0 0 8px rgba(255, 65, 108, 0.5); }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.7); }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(45deg,#ff416c,#ff4b2b); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4); }
        button:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6); }
        .error { color: #ffb3b3; font-size: 13px; margin-bottom: 15px; background: rgba(255,0,0,0.2); padding: 10px; border-radius: 5px; border: 1px solid rgba(255,0,0,0.3); text-align: center; font-weight: 500; }
        .google-btn-container { display: flex; justify-content: center; margin-top: 5px; }
        @media(max-width:900px){ .container { flex-direction: column; width: 90%; height: auto; margin: 20px 0; } .left, .right { width: 100%; padding: 40px 30px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>Attendance System</h1>
        <p>Welcome to smart attendance management system. Login with your official email to continue.</p>
    </div>

    <div class="right">
        <div class="login-box">
            <h2>Login</h2>
            <div class="error" id="error" style="display:none;"></div>

            <form id="login-form" autocomplete="off" novalidate>
                <div class="input-group">
                    <input type="email" id="email" name="username" placeholder="Enter Email" required>
                </div>

                <div class="input-group">
                    <input type="text" id="password" name="password" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="Enter Password (Numbers Only)" required>
                </div>

                <div style="text-align:right; margin-bottom:15px;">
                    <a href="#" style="color:#fff; font-size:13px; text-decoration:none; opacity: 0.8;">Forgot Password?</a>
                </div>

                <button type="submit" id="loginBtn">Secure Login</button>

                <div style="text-align:center; margin-top:20px; margin-bottom:15px; color:#ddd; font-size: 12px; letter-spacing: 1px;">OR LOGIN WITH</div>
                <div id="g_id_onload" data-client_id="923347064449-686t2lvv2nnm4ocjmosp0h50knjrfcvt.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="google-btn-container"><div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue" data-text="sign_in_with" data-shape="pill" data-logo_alignment="left"></div></div>
            </form>
        </div>
    </div>
</div>

<script>
const VALID_DOMAINS = ['gmail.com', 'yahoo.com', 'outlook.com'];

// 💡 અહીં તમારી Google Apps Script ની લિંક નાખવાની રહેશે (જેથી ડેટા ઓનલાઈન સિંક થાય)
const CLOUD_API_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE"; 

document.getElementById("login-form").addEventListener("submit", function(e){
    e.preventDefault(); 
    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value.trim();
    
    if (!email || !password) { showError("Please fill in all fields."); return; }

    let domain = email.split('@')[1];
    if (!domain || !VALID_DOMAINS.includes(domain)) { showError("Please use a valid email address."); return; }

    if (!/^[0-9]+$/.test(password)) { showError("Password must contain numbers only."); return; }

    processLoginSuccess(email);
});

// 🔄 લોગિન સક્સેસ થાય એટલે ક્લાઉડમાંથી એક્સેલ ડેટા ખેંચીને કમ્પ્યુટરમાં સેટ કરવાનું ફંક્શન
function processLoginSuccess(email) {
    hideError();
    document.getElementById("loginBtn").innerText = "⏳ Syncing Data...";
    localStorage.setItem('loggedInUser', email);

    if (CLOUD_API_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE") {
        // જો ઓનલાઈન સેટિંગ ન કર્યું હોય તો ડાયરેક્ટ આગળ જશે
        window.location.href = "home.html";
        return;
    }

    // 🌐 ક્લાઉડમાંથી ડેટા મેળવો અને કમ્પ્યુટરના લોકલ સ્ટોરેજમાં નાખી દો
    fetch(`${CLOUD_API_URL}?action=getData&school=${email}`)
        .then(res => res.json())
        .then(cloudData => {
            if (cloudData && Object.keys(cloudData).length > 0) {
                // મહત્વનું: આ લાઈન તમારા બાકીના બધા પેજ (જેમ કે pat-gun-silip.html) માટે બેકગ્રાઉન્ડમાં ડેટા સેટ કરી દેશે!
                localStorage.setItem("processedStudentData", JSON.stringify(cloudData));
            }
            window.location.href = "home.html";
        })
        .catch(err => {
            // કોઈ નેટવર્ક પ્રોબ્લેમ હોય તો પણ લોગિન થઈ જશે
            window.location.href = "home.html";
        });
}

function showError(msg) { let e = document.getElementById("error"); e.innerText = msg; e.style.display = "block"; }
function hideError() { document.getElementById("error").style.display = "none"; }

function handleCredentialResponse(response) {
    try {
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
        const googleEmail = JSON.parse(jsonPayload).email.toLowerCase();
        processLoginSuccess(googleEmail);
    } catch (err) { showError("Authentication failed."); }
}
</script>
</body>
</html>
